<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HueFork</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body
    class="min-h-screen bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-50 font-sans flex flex-col transition-colors duration-300 overflow-x-hidden"
  >
    <header
      class="border-b border-zinc-200 dark:border-zinc-800 sticky top-0 bg-white/95 dark:bg-zinc-950/95 backdrop-blur z-50 transition-colors duration-300"
    >
      <div
        class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between relative"
      >
        <div class="flex-1 flex items-center justify-start">
          <button
            id="burger-toggle"
            class="p-2 -ml-2 text-zinc-600 hover:text-black dark:text-zinc-400 dark:hover:text-white transition-colors"
            aria-label="Меню"
          >
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <line x1="4" x2="20" y1="12" y2="12"></line>
               <line x1="4" x2="20" y1="6" y2="6"></line>
               <line x1="4" x2="20" y1="18" y2="18"></line>
            </svg>
          </button>
        </div>

        <a
          href="#/"
          id="header-logo"
          class="flex items-center justify-center flex-shrink-0 group"
        >
          <img
            src="https://i.postimg.cc/CKFt1H8R/file-00000000ef1471f6bf959e3f3217711b.png"
            alt="HueFork"
            class="h-10 w-10 object-cover rounded-full border border-black/10 dark:border-white/10 dark:invert transition-all"
          />
          <span
            class="ml-3 font-serif font-black text-2xl tracking-tighter"
            >HueFork</span
          >
        </a>

        <div class="flex-1"></div>
      </div>
    </header>

    <!-- Mobile Menu Overlay -->
    <div id="burger-menu" class="fixed inset-0 bg-white/95 dark:bg-zinc-950/95 backdrop-blur-md z-[100] transform -translate-x-full transition-transform duration-300 flex flex-col">
      <div class="h-16 flex items-center justify-between px-6 border-b border-zinc-200 dark:border-zinc-800">
        <span class="font-serif font-black text-2xl tracking-tighter">Меню</span>
        <button id="burger-close" class="p-2 -mr-2 text-zinc-600 hover:text-black dark:text-zinc-400 dark:hover:text-white transition-colors" aria-label="Закрыть">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
          </svg>
        </button>
      </div>
      
      <div class="px-6 py-4 border-b border-zinc-200 dark:border-zinc-800" id="search-container">
        <!-- Kept the search-toggle just hidden so main.js doesn't break if it expects to click it -->
        <button id="search-toggle" class="hidden"></button>
        
        <div id="search-dropdown" class="w-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl overflow-hidden shadow-sm">
          <div class="flex items-center p-3 border-b border-zinc-200 dark:border-zinc-800">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="text-zinc-400 flex-shrink-0"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.3-4.3" />
            </svg>
            <input
              id="search-input"
              type="text"
              placeholder="Поиск альбомов, артистов..."
              class="flex-grow ml-2 bg-transparent text-sm font-sans focus:outline-none text-zinc-900 dark:text-white w-full"
            />
            <button
              id="search-clear"
              class="hidden p-1 text-zinc-400 hover:text-black dark:hover:text-white flex-shrink-0"
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6 6 18" />
                <path d="m6 6 12 12" />
              </svg>
            </button>
          </div>
          <div
            id="search-results"
            class="max-h-[40vh] overflow-y-auto hidden"
          ></div>
        </div>
      </div>

      <nav class="flex-1 overflow-y-auto flex flex-col mt-4">
        <a href="#/profile" class="mobile-menu-link px-6 py-4 text-xs font-bold uppercase tracking-widest text-zinc-600 dark:text-zinc-400 border-b border-zinc-100 dark:border-zinc-900 hover:text-black dark:hover:text-white hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-colors flex items-center justify-between">Профиль <span class="text-red-500">→</span></a>
        <a href="#/bnm" class="mobile-menu-link px-6 py-4 text-xs font-bold uppercase tracking-widest text-zinc-600 dark:text-zinc-400 border-b border-zinc-100 dark:border-zinc-900 hover:text-black dark:hover:text-white hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-colors flex items-center justify-between">Лучшая новая музыка <span class="text-red-500">→</span></a>
        <a href="#/bnt" class="mobile-menu-link px-6 py-4 text-xs font-bold uppercase tracking-widest text-zinc-600 dark:text-zinc-400 border-b border-zinc-100 dark:border-zinc-900 hover:text-black dark:hover:text-white hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-colors flex items-center justify-between">Лучший новый трек <span class="text-red-500">→</span></a>
        <a href="#/top" class="mobile-menu-link px-6 py-4 text-xs font-bold uppercase tracking-widest text-zinc-600 dark:text-zinc-400 border-b border-zinc-100 dark:border-zinc-900 hover:text-black dark:hover:text-white hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-colors flex items-center justify-between">Топ релизов <span class="text-red-500">→</span></a>
        <a href="#/notes" class="mobile-menu-link px-6 py-4 text-xs font-bold uppercase tracking-widest text-zinc-600 dark:text-zinc-400 border-b border-zinc-100 dark:border-zinc-900 hover:text-black dark:hover:text-white hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-colors flex items-center justify-between">Заметки <span class="text-red-500">→</span></a>
        <a href="#/archive" class="mobile-menu-link px-6 py-4 text-xs font-bold uppercase tracking-widest text-zinc-600 dark:text-zinc-400 border-b border-zinc-100 dark:border-zinc-900 hover:text-black dark:hover:text-white hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-colors flex items-center justify-between">Архив ивентов <span class="text-red-500">→</span></a>
      </nav>
      <div class="px-6 py-8 border-t border-zinc-200 dark:border-zinc-800 flex items-center justify-between">
        <button id="theme-toggle" class="flex items-center gap-3 p-2 bg-zinc-100 dark:bg-zinc-900 rounded-full hover:bg-zinc-200 dark:hover:bg-zinc-800 transition-colors text-zinc-900 dark:text-white">
          <!-- Icon injected by JS -->
        </button>
        <div class="text-xs font-bold uppercase tracking-widest text-zinc-400 dark:text-zinc-600">HueFork 2026</div>
      </div>
    </div>

    <main id="app" class="flex-grow">
      <div class="flex flex-col items-center justify-center min-h-[60vh] h-full w-full">
        <div class="relative w-20 h-20 flex items-center justify-center">
          <svg viewBox="0 0 100 100" class="w-full h-full absolute inset-0 animate-spin">
            <circle cx="50" cy="50" r="45" fill="none" class="stroke-zinc-200 dark:stroke-zinc-800" stroke-width="4" />
            <circle cx="50" cy="50" r="45" fill="none" class="stroke-red-500" stroke-width="4" stroke-dasharray="283" stroke-dashoffset="180" stroke-linecap="round" />
          </svg>
          <img src="https://i.postimg.cc/CKFt1H8R/file-00000000ef1471f6bf959e3f3217711b.png" alt="HueFork" class="w-10 h-10 object-cover rounded-full dark:invert animate-pulse relative z-10" />
        </div>
        <div class="mt-8 font-serif font-black text-2xl tracking-widest uppercase text-zinc-900 dark:text-zinc-100 animate-pulse">HueFork</div>
      </div>
    </main>
    <div id="compare-container"></div>

    <footer
      class="bg-zinc-900 dark:bg-black text-white py-12 mt-12 transition-colors duration-300"
    >
      <div class="max-w-7xl mx-auto px-4 text-center">
        <div class="flex justify-center mb-6">
          <img
            src="https://i.postimg.cc/CKFt1H8R/file-00000000ef1471f6bf959e3f3217711b.png"
            alt="HueFork"
            class="h-12 w-12 object-cover rounded-full dark:invert transition-all"
          />
        </div>
        <p class="text-zinc-400 text-sm mb-6">
          &copy; <span id="current-year"></span> HueFork. Все права защищены.
        </p>
        <div class="flex justify-center">
          <a href="https://t.me/HueFork" target="_blank" rel="noopener noreferrer" class="bg-zinc-900 dark:bg-zinc-100 hover:bg-black dark:hover:bg-white text-white dark:text-black border border-zinc-800 dark:border-zinc-200 hover:border-[#2AABEE] dark:hover:border-[#2AABEE] px-6 py-2.5 rounded-full font-bold flex items-center gap-2 transform active:scale-95 transition-all duration-300 text-xs uppercase tracking-widest shadow-sm group hover:shadow-[0_0_15px_rgba(42,171,238,0.2)]">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2AABEE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="transition-transform group-hover:scale-110 group-hover:-rotate-3"><path d="M22 2 11 13"></path><path d="m22 2-7 20-4-9-9-4Z"></path></svg>
            <span>Telegram-канал</span>
          </a>
        </div>
      </div>
    </footer>
    <script type="module" src="./main.js"></script>
  </body>
</html>
