<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HueFork</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body
    class="min-h-screen bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-50 font-sans flex flex-col transition-colors duration-300 overflow-x-hidden"
  >
    <header
      class="border-b border-zinc-200 dark:border-zinc-800 sticky top-0 bg-white/95 dark:bg-zinc-950/95 backdrop-blur z-50 transition-colors duration-300"
    >
      <div
        class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between relative"
      >
        <div class="flex-1 flex items-center gap-2 sm:gap-4">
          <button
            id="theme-toggle"
            class="p-2 -ml-2 sm:ml-0 text-zinc-600 hover:text-black dark:text-zinc-400 dark:hover:text-white transition-colors"
            aria-label="Toggle theme"
          >
            <!-- Icon injected by JS -->
          </button>
          <a
            href="#/bnm"
            class="text-xs font-bold uppercase tracking-widest text-red-600 dark:text-red-500 hover:text-red-700 dark:hover:text-red-400 transition-colors hidden sm:block"
            >Лучшая новая музыка</a
          >
          <a
            href="#/bnm"
            class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-red-600 dark:text-red-500 hover:text-red-700 dark:hover:text-red-400 transition-colors sm:hidden"
            >BNM</a
          >
          <a href="#/top" class="text-xs font-bold uppercase tracking-widest text-zinc-600 dark:text-zinc-400 hover:text-black dark:hover:text-white transition-colors hidden sm:block">Топ</a>
          <a href="#/top" class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-zinc-600 dark:text-zinc-400 hover:text-black dark:hover:text-white transition-colors sm:hidden">Топ</a>
        </div>
        <a
          href="#/"
          id="header-logo"
          class="flex items-center justify-center flex-shrink-0 group"
        >
          <img
            src="https://i.postimg.cc/CKFt1H8R/file-00000000ef1471f6bf959e3f3217711b.png"
            alt="HueFork"
            class="h-10 w-10 object-cover rounded-full border border-black/10 dark:border-white/10 dark:invert transition-all"
          />
          <span
            class="ml-3 font-serif font-black text-2xl tracking-tighter hidden sm:block"
            >HueFork</span
          >
        </a>
        <div class="flex-1 flex justify-end items-center relative gap-2 sm:gap-4" id="search-container">
          <a
            href="#/notes"
            class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-zinc-500 hover:text-black dark:hover:text-white transition-colors"
            >Заметки</a
          >
          <a
            href="#/bnt"
            class="text-xs font-bold uppercase tracking-widest text-red-600 dark:text-red-500 hover:text-red-700 dark:hover:text-red-400 transition-colors hidden sm:block"
            >Лучший новый трек</a
          >
          <a
            href="#/bnt"
            class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-red-600 dark:text-red-500 hover:text-red-700 dark:hover:text-red-400 transition-colors sm:hidden"
            >BNT</a
          >
          <button
            id="search-toggle"
            class="p-2 -mr-2 sm:mr-0 text-zinc-600 hover:text-black dark:text-zinc-400 dark:hover:text-white transition-colors"
            aria-label="Поиск"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.3-4.3" />
            </svg>
          </button>

          <div
            id="search-dropdown"
            class="hidden absolute top-full right-0 mt-2 w-[calc(100vw-2rem)] sm:w-96 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 shadow-2xl z-[60] rounded-md overflow-hidden animate-slide-up"
          >
            <div
              class="flex items-center p-2 border-b border-zinc-200 dark:border-zinc-800"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="text-zinc-400 ml-2 flex-shrink-0"
              >
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.3-4.3" />
              </svg>
              <input
                id="search-input"
                type="text"
                placeholder="Поиск альбомов, артистов..."
                class="flex-grow p-2 bg-transparent text-sm font-sans focus:outline-none text-zinc-900 dark:text-white"
              />
              <button
                id="search-clear"
                class="hidden p-2 text-zinc-400 hover:text-black dark:hover:text-white flex-shrink-0"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M18 6 6 18" />
                  <path d="m6 6 12 12" />
                </svg>
              </button>
            </div>
            <div
              id="search-results"
              class="max-h-[60vh] sm:max-h-96 overflow-y-auto hidden"
            ></div>
          </div>
        </div>
      </div>
    </header>

    <main id="app" class="flex-grow">
      <!-- Dynamic content -->
    </main>
    <div id="compare-container"></div>

    <footer
      class="bg-zinc-900 dark:bg-black text-white py-12 mt-12 transition-colors duration-300"
    >
      <div class="max-w-7xl mx-auto px-4 text-center">
        <div class="flex justify-center mb-6">
          <img
            src="https://i.postimg.cc/CKFt1H8R/file-00000000ef1471f6bf959e3f3217711b.png"
            alt="HueFork"
            class="h-12 w-12 object-cover rounded-full dark:invert transition-all"
          />
        </div>
        <p class="text-zinc-400 text-sm mb-6">
          &copy; <span id="current-year"></span> HueFork. Все права защищены.
        </p>
        <div class="flex justify-center">
          <a href="https://t.me/HueFork" target="_blank" rel="noopener noreferrer" class="bg-zinc-900 dark:bg-zinc-100 hover:bg-black dark:hover:bg-white text-white dark:text-black border border-zinc-800 dark:border-zinc-200 hover:border-[#2AABEE] dark:hover:border-[#2AABEE] px-6 py-2.5 rounded-full font-bold flex items-center gap-2 transform active:scale-95 transition-all duration-300 text-xs uppercase tracking-widest shadow-sm group hover:shadow-[0_0_15px_rgba(42,171,238,0.2)]">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2AABEE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="transition-transform group-hover:scale-110 group-hover:-rotate-3"><path d="M22 2 11 13"></path><path d="m22 2-7 20-4-9-9-4Z"></path></svg>
            <span>Telegram-канал</span>
          </a>
        </div>
      </div>
    </footer>
    <script type="module" src="./main.js"></script>
  </body>
</html>
